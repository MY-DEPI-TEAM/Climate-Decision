services:
  # 1. حاوية قاعدة البيانات (SQL Server)
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: climate_db_container
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong@Password123", "-C", "-Q", "SELECT 1"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. حاوية الـ Python Pipeline بتاعك
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: climate_pipeline_container
    environment:
      - DB_SERVER=host.docker.internal
      - DB_NAME=Climate_Decision
      - DB_USER=sa
      - DB_PASSWORD=YourStrong@Password123
    depends_on:
      database:
        condition: service_healthy

volumes:
  mssql_data: